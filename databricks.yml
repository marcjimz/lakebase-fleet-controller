bundle:
  name: lakebase-fleet-controller
  databricks_cli_version: ">= 0.287.0"
  deployment:
    lock:
      enabled: true

variables:
  quota:
    description: "Maximum Lakebase instances allowed in the workspace"
    default: 1000
  enabled:
    description: "Enable autoscaler (cleanup orphans)"
    default: "true"
  placeholders:
    description: "Fill remaining quota with placeholder projects"
    default: "false"

resources:
  # ────────────────────────────────────────────────────────────────────────────
  # LAKEBASE PROJECTS — uncomment and duplicate to add real projects.
  #
  # The autoscaler uses the owner=dab tag to identify DAB-managed projects
  # and protect them from deletion. When adding/removing projects, update
  # the real_names job parameter default to match (pipe-separated).
  # ────────────────────────────────────────────────────────────────────────────
  postgres_projects:
    # fleet-demo-1:
    #   project_id: fleet-demo-1
    #   display_name: fleet-demo-1
    #   pg_version: 17
    #   custom_tags:
    #     - key: owner
    #       value: dab
    #     - key: managed_by
    #       value: lakebase-fleet-controller
    lakebase-project-demo:
      project_id: lakebase-project-demo
      display_name: lakebase-project-demo
      pg_version: 17
      custom_tags:
        - key: owner
          value: dab
        - key: managed_by
          value: lakebase-fleet-controller

  # ────────────────────────────────────────────────────────────────────────────
  # AUTOSCALER JOB — single notebook that lists, cleans, and fills projects.
  # ────────────────────────────────────────────────────────────────────────────
  jobs:
    autoscaler:
      name: lakebase-fleet-autoscaler
      max_concurrent_runs: 1
      # Run every 10 minutes to self-heal (repopulate deleted placeholders,
      # clean up orphans). CI also triggers an immediate run after deploy.
      schedule:
        quartz_cron_expression: "0 */10 * * * ?"
        timezone_id: "UTC"
      tasks:
        - task_key: autoscale
          notebook_task:
            notebook_path: src/autoscaler/main.py
            source: WORKSPACE
            base_parameters:
              enabled: "{{job.parameters.enabled}}"
              placeholders: "{{job.parameters.placeholders}}"
              quota: "{{job.parameters.quota}}"
              real_names: "{{job.parameters.real_names}}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - databricks-sdk
      # ── Job parameters ──────────────────────────────────────────────────
      # Defaults are used by scheduled runs. CI overrides them with --params.
      # real_names is auto-synced from postgres_projects during CI deploy.
      parameters:
        - name: enabled
          default: "${var.enabled}"
        - name: placeholders
          default: "${var.placeholders}"
        - name: real_names
          default: "" # real_names
        - name: quota
          default: "${var.quota}"
      tags:
        owner: dab

targets:
  dev:
    workspace:
      host: https://fevm-lakebase-hls-workshop.cloud.databricks.com

  # ──────────────────────────────────────────────────────────────────────────
  # Promotion targets — uncomment as needed.
  # Each target MUST point to its own workspace. Using the same workspace
  # across multiple targets is NOT tested and NOT recommended.
  # ──────────────────────────────────────────────────────────────────────────

