bundle:
  name: lakebase-fleet-controller
  databricks_cli_version: ">= 0.287.0"
  deployment:
    lock:
      enabled: true

variables:
  deploy_sp:
    description: "Service principal for CI deploys (used by run_as in promotion targets)"
    default: ""
  quota:
    description: "Maximum Lakebase instances allowed in the workspace"
    default: 1000
  enabled:
    description: "Enable autoscaler (cleanup orphans)"
    default: "true"
  placeholders:
    description: "Fill remaining quota with placeholder projects"
    default: "false"

resources:
  # ────────────────────────────────────────────────────────────────────────────
  # LAKEBASE PROJECTS — edit this section to add or remove real projects.
  #
  # Each entry creates a managed Lakebase Autoscaling project.
  # The autoscaler uses the owner=dab custom_tag to identify DAB-managed
  # projects and protect them from deletion.
  #
  # To add:    copy an existing block, change project_id + display_name.
  # To remove: delete the resource block (autoscaler will clean up).
  # ────────────────────────────────────────────────────────────────────────────
  # ────────────────────────────────────────────────────────────────────────────
  # AUTOSCALER JOB — fills remaining quota with stopped placeholders and
  # cleans up anything not managed by this bundle.
  # ────────────────────────────────────────────────────────────────────────────
  jobs:
    autoscaler:
      name: lakebase-fleet-autoscaler
      max_concurrent_runs: 1
      # Run every 10 minutes to self-heal (repopulate deleted placeholders,
      # clean up orphans). CI also triggers an immediate run after deploy.
      schedule:
        quartz_cron_expression: "0 */10 * * * ?"
        timezone_id: "UTC"
      tasks:
        - task_key: autoscale
          notebook_task:
            notebook_path: src/autoscaler/main.py
            source: WORKSPACE
            base_parameters:
              enabled: "{{job.parameters.enabled}}"
              placeholders: "{{job.parameters.placeholders}}"
              quota: "{{job.parameters.quota}}"
              real_names: "{{job.parameters.real_names}}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - databricks-sdk
      # ── Job parameters ──────────────────────────────────────────────────
      # Defaults are used by scheduled runs. CI overrides them with --params.
      # IMPORTANT: when adding/removing postgres_projects above, update
      # the real_names default to match (pipe-separated project_ids).
      parameters:
        - name: enabled
          default: "${var.enabled}"
        - name: placeholders
          default: "${var.placeholders}"
        - name: real_names
          default: ""
        - name: quota
          default: "${var.quota}"
      tags:
        owner: dab

targets:
  dev:
    workspace:
      host: https://fevm-lakebase-hls-workshop.cloud.databricks.com

  # ──────────────────────────────────────────────────────────────────────────
  # Promotion targets — uncomment as needed.
  # Each target MUST point to its own workspace. Using the same workspace
  # across multiple targets is NOT tested and NOT recommended.
