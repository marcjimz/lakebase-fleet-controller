bundle:
  name: lakebase-fleet-controller
  databricks_cli_version: ">= 0.287.0"
  deployment:
    lock:
      enabled: true

variables:
  deploy_sp:
    description: "Service principal for CI deploys (used by run_as in promotion targets)"
    default: ""
  quota:
    description: "Maximum Lakebase instances allowed in the workspace"
    default: 1000

resources:
  # ────────────────────────────────────────────────────────────────────────────
  # LAKEBASE PROJECTS — edit this section to add or remove real projects.
  #
  # Each entry creates a managed Lakebase Autoscaling project.
  # The autoscaler uses the owner=dab custom_tag to identify DAB-managed
  # projects and protect them from deletion.
  #
  # To add:    copy an existing block, change project_id + display_name.
  # To remove: delete the resource block (autoscaler will clean up).
  # ────────────────────────────────────────────────────────────────────────────
  postgres_projects:
    fleet_proj_1:
      project_id: fleet-proj-1
      display_name: fleet-proj-1
      pg_version: 17
      custom_tags:
        - key: owner
          value: dab
        - key: managed_by
          value: lakebase-fleet-controller

    fleet_proj_2:
      project_id: fleet-proj-2
      display_name: fleet-proj-2
      pg_version: 17
      custom_tags:
        - key: owner
          value: dab
        - key: managed_by
          value: lakebase-fleet-controller

    fleet_proj_3:
      project_id: fleet-proj-3
      display_name: fleet-proj-3
      pg_version: 17
      custom_tags:
        - key: owner
          value: dab
        - key: managed_by
          value: lakebase-fleet-controller

  # ────────────────────────────────────────────────────────────────────────────
  # AUTOSCALER JOB — fills remaining quota with stopped placeholders and
  # cleans up anything not managed by this bundle.
  # ────────────────────────────────────────────────────────────────────────────
  jobs:
    autoscaler:
      name: lakebase-fleet-autoscaler
      max_concurrent_runs: 1
      # Run every 10 minutes to self-heal (repopulate deleted placeholders,
      # clean up orphans). CI also triggers an immediate run after deploy.
      schedule:
        quartz_cron_expression: "0 */10 * * * ?"
        timezone_id: "UTC"
      tasks:
        # ── Step 1: Plan ────────────────────────────────────────────────────
        # Notebook task so it can use dbutils.jobs.taskValues.set() to pass
        # delete_names and create_names to downstream tasks.
        - task_key: plan
          notebook_task:
            notebook_path: src/autoscaler/plan.py
            source: WORKSPACE
            base_parameters:
              real_names: "{{job.parameters.real_names}}"
              quota: "{{job.parameters.quota}}"
          environment_key: default

        # ── Step 2: Cleanup ─────────────────────────────────────────────────
        # Deletes orphans + excess placeholders identified by the plan task.
        - task_key: cleanup
          depends_on:
            - task_key: plan
          environment_key: default
          spark_python_task:
            python_file: src/autoscaler/main.py
            parameters:
              - "--mode"
              - "cleanup_batch"
              - "--delete-names"
              - "{{tasks.plan.values.delete_names}}"

        # ── Step 3: Fill (parallel) ─────────────────────────────────────────
        # Creates placeholder instances in parallel using for_each_task.
        - task_key: fill
          depends_on:
            - task_key: cleanup
          for_each_task:
            concurrency: 50
            inputs: "{{tasks.plan.values.create_names}}"
            task:
              task_key: create_one
              environment_key: default
              spark_python_task:
                python_file: src/autoscaler/main.py
                parameters:
                  - "--mode"
                  - "create_one"
                  - "--instance-name"
                  - "{{input}}"

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk
      # ── Job parameters ──────────────────────────────────────────────────
      # Defaults are used by scheduled runs. CI overrides them with --params.
      # IMPORTANT: when adding/removing postgres_projects above, update
      # the real_names default to match (pipe-separated project_ids).
      parameters:
        - name: real_names
          default: "fleet-proj-1|fleet-proj-2|fleet-proj-3"
        - name: quota
          default: "${var.quota}"
      tags:
        owner: dab

targets:
  dev:
    workspace:
      host: https://fevm-lakebase-hls-workshop.cloud.databricks.com

  # ──────────────────────────────────────────────────────────────────────────
  # Promotion targets — uncomment as needed.
  # Each target MUST point to its own workspace. Using the same workspace
  # across multiple targets is NOT tested and NOT recommended.
