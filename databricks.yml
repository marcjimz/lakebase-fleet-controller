bundle:
  name: lakebase-fleet-controller
  databricks_cli_version: ">= 0.275.0"
  deployment:
    lock:
      enabled: true

variables:
  deploy_sp:
    description: "Service principal for CI deploys (used by run_as in promotion targets)"
    default: ""
  quota:
    description: "Maximum Lakebase instances allowed in the workspace"
    default: 1000
  headroom:
    description: "Slots reserved as buffer"
    default: 10

resources:
  # ────────────────────────────────────────────────────────────────────────────
  # LAKEBASE INSTANCES — edit this section to add or remove real instances.
  #
  # Each entry creates a managed Lakebase instance with:
  #   - owner=dab tag (protects it from autoscaler deletion)
  #   - prevent_destroy lifecycle (requires two-PR process to remove)
  #
  # Capacity SKUs: CU_1, CU_2, CU_4, CU_8
  #
  # To add:    copy an existing block, change name + capacity.
  # To remove:
  #   1. First PR — set prevent_destroy to false
  #   2. Second PR — delete the resource block
  # ────────────────────────────────────────────────────────────────────────────
  database_instances:
    lakebase_project_1:
      name: fleet-project-1
      capacity: CU_1
      custom_tags:
        - key: owner
          value: dab
        - key: managed_by
          value: lakebase-fleet-controller
      lifecycle:
        prevent_destroy: false  # TODO: restore to true after rename transition

    lakebase_project_2:
      name: fleet-project-2
      capacity: CU_2
      custom_tags:
        - key: owner
          value: dab
        - key: managed_by
          value: lakebase-fleet-controller
      lifecycle:
        prevent_destroy: false  # TODO: restore to true after rename transition

    lakebase_project_3:
      name: fleet-project-3
      capacity: CU_1
      custom_tags:
        - key: owner
          value: dab
        - key: managed_by
          value: lakebase-fleet-controller
      lifecycle:
        prevent_destroy: false  # TODO: restore to true after rename transition

  # ────────────────────────────────────────────────────────────────────────────
  # AUTOSCALER JOB — fills remaining quota with stopped placeholders and
  # cleans up anything not managed by this bundle.
  # ────────────────────────────────────────────────────────────────────────────
  jobs:
    autoscaler:
      name: lakebase-fleet-autoscaler
      max_concurrent_runs: 1
      tasks:
        # ── Step 1: Plan ────────────────────────────────────────────────────
        # Notebook task so it can use dbutils.jobs.taskValues.set() to pass
        # delete_names and create_names to downstream tasks.
        - task_key: plan
          notebook_task:
            notebook_path: src/autoscaler/plan.py
            source: WORKSPACE
            base_parameters:
              real_names: "{{job.parameters.real_names}}"
              quota: "{{job.parameters.quota}}"
              headroom: "{{job.parameters.headroom}}"
          environment_key: default

        # ── Step 2: Cleanup ─────────────────────────────────────────────────
        # Deletes orphans + excess placeholders identified by the plan task.
        - task_key: cleanup
          depends_on:
            - task_key: plan
          environment_key: default
          spark_python_task:
            python_file: src/autoscaler/main.py
            parameters:
              - "--mode"
              - "cleanup_batch"
              - "--delete-names"
              - "{{tasks.plan.values.delete_names}}"

        # ── Step 3: Fill (parallel) ─────────────────────────────────────────
        # Creates placeholder instances in parallel using for_each_task.
        - task_key: fill
          depends_on:
            - task_key: cleanup
          for_each_task:
            concurrency: 100
            inputs: "{{tasks.plan.values.create_names}}"
            task:
              task_key: create_one
              environment_key: default
              spark_python_task:
                python_file: src/autoscaler/main.py
                parameters:
                  - "--mode"
                  - "create_one"
                  - "--instance-name"
                  - "{{input}}"

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk
      parameters:
        - name: real_names
          default: ""
        - name: quota
          default: "1000"
        - name: headroom
          default: "10"
      tags:
        owner: dab

targets:
  dev:
    workspace:
      host: https://fevm-lakebase-hls-workshop.cloud.databricks.com

  # ──────────────────────────────────────────────────────────────────────────
