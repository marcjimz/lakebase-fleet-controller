name: Deploy Lakebase Fleet Controller

on:
  push:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# DEV
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: DEV
    concurrency:
      group: lakebase-fleet-dev
      cancel-in-progress: false
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main

      - name: Authenticate
        run: databricks current-user me

      - name: Validate bundle
        run: databricks bundle validate -t dev

      # TODO: re-enable after instance rename transition is complete
      # - name: Verify resource protections
      #   run: bash scripts/verify_protected.sh dev

      - name: Extract deploy targets from bundle
        id: targets
        run: |
          BUNDLE=$(databricks bundle validate -t dev -o json)
          REAL_NAMES=$(echo "$BUNDLE" | jq -r '[.resources.postgres_projects // {} | to_entries[] | select(.value.custom_tags[]? | .key == "owner" and .value == "dab") | .value.project_id] | join("|")')
          REAL_COUNT=$(echo "$BUNDLE" | jq '[.resources.postgres_projects // {} | to_entries[] | select(.value.custom_tags[]? | .key == "owner" and .value == "dab")] | length')
          QUOTA=$(echo "$BUNDLE" | jq -r '.variables.quota.value // 1000')
          echo "real_names=$REAL_NAMES"   >> $GITHUB_OUTPUT
          echo "real_count=$REAL_COUNT"   >> $GITHUB_OUTPUT
          echo "quota=$QUOTA"             >> $GITHUB_OUTPUT
          echo "Extracted: real_names=$REAL_NAMES, real_count=$REAL_COUNT, quota=$QUOTA"

      - name: Pre-deploy reconciliation (cleanup orphans + free slots)
        run: bash scripts/pre_deploy_shrink.sh "${{ steps.targets.outputs.real_names }}" "${{ steps.targets.outputs.real_count }}"

      - name: Deploy bundle
        run: databricks bundle deploy -t dev --auto-approve

      - name: Reconcile fleet
        run: |
          databricks bundle run autoscaler -t dev \
            --params "enabled=true,placeholders=true,real_names=${{ steps.targets.outputs.real_names }},quota=${{ steps.targets.outputs.quota }}"

